# yamllint configuration for autoware-index-github-actions.
# Defaults are too strict for GitHub Actions workflows (which use `on:` keys);
# the overrides below relax those without losing the catch-typo benefit.

extends: default

rules:
  truthy:
    # GitHub Actions uses `on:` as a top-level key; without this, yamllint
    # flags it as a truthy value.
    check-keys: false
  document-start: disable
  line-length: disable
  comments-indentation: disable
