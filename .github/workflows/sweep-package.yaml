name: sweep-package

# Reusable workflow that clones an external ROS 2 package at a pinned
# ref and builds + tests it against a version-pinned Autoware Core
# container image ("sweep mode"). Called by the autoware-index
# sweep workflows (sweep-eager.yaml, future sweep-release.yaml,
# sweep-nightly.yaml).
#
# Differs from validate-package.yaml (producer mode):
#   - Explicit external clone + checkout at package_ref (no
#     actions/checkout of the caller).
#   - No ccache, no clang-tidy: sweep runs are batch validation across
#     many changed packages and only record build/test pass/fail in the
#     history envelope.
#   - Uploads result.json as a per-matrix-row artifact for the recorder
#     (scripts/build_envelopes.py in autoware-index consumes the
#     "validate-result-*" pattern with filenames shaped
#     "<distro>-<package>-<resolved_version>"); the recorder reads the
#     resolved autoware_version out of result.json.
#   - Exports resolved_sha so the recorder can pin the exact commit.
#
# autoware_version is optional. When unset (the default), the `resolve`
# job picks the version at runtime so sweep callers do not have to thread
# it through their matrix. See the autoware_version input docstring.
#
# Registered packages must not ship a build_depends.repos: the pinned
# image already contains the matching Autoware Core build, so this
# workflow intentionally does not expose a build_depends_repos input.

on:
  workflow_call:
    inputs:
      ros_distro:
        description: 'ROS 2 distribution (e.g. "jazzy").'
        required: true
        type: string
      autoware_version:
        description: |
          Autoware SemVer (e.g. "1.8.0"). Drives the container tag.
          When empty (the default), the workflow falls back to the
          latest-autoware-version composite action — the freshest
          autoware release whose container image is already on GHCR.
          See .github/actions/latest-autoware-version/action.yaml. The recorder
          reads the resolved value from result.json.
        required: false
        type: string
        default: ''
      package_name:
        description: 'ROS package name; passed to colcon --packages-up-to.'
        required: true
        type: string
      package_repository:
        description: 'Git URL of the package to clone.'
        required: true
        type: string
      package_ref:
        description: 'Tag, branch, or SHA of package_repository to check out.'
        required: true
        type: string
      base_image_stage:
        description: 'Container image stage. Defaults to core-devel.'
        required: false
        type: string
        default: core-devel
      runs-on:
        description: |
          Runner label as a JSON-encoded array (workaround for the lack
          of array inputs in workflow_call). Default: '["ubuntu-24.04"]'.
        required: false
        type: string
        default: '["ubuntu-24.04"]'

    outputs:
      resolved_sha:
        description: The exact commit SHA that was checked out and built.
        value: ${{ jobs.validate.outputs.resolved_sha }}

jobs:
  resolve:
    name: resolve autoware_version
    runs-on: ubuntu-24.04
    outputs:
      autoware_version: ${{ inputs.autoware_version || steps.latest.outputs.autoware_version }}
    steps:
      - name: Resolve latest autoware_version
        id: latest
        if: inputs.autoware_version == ''
        uses: autowarefoundation/autoware-index-github-actions/.github/actions/latest-autoware-version@main
        with:
          ros_distro: ${{ inputs.ros_distro }}
          base_image_stage: ${{ inputs.base_image_stage }}

  validate:
    needs: resolve
    name: sweep build+test (${{ inputs.ros_distro }}, autoware ${{ needs.resolve.outputs.autoware_version }}, ${{ inputs.package_name }})
    runs-on: ${{ fromJson(inputs.runs-on) }}
    container:
      image: ghcr.io/autowarefoundation/autoware:${{ inputs.base_image_stage }}-${{ inputs.ros_distro }}-${{ needs.resolve.outputs.autoware_version }}
    outputs:
      resolved_sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Clone external package
        env:
          PACKAGE_REPOSITORY: ${{ inputs.package_repository }}
          PACKAGE_REF: ${{ inputs.package_ref }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          git clone "${PACKAGE_REPOSITORY}" .
          git checkout "${PACKAGE_REF}"

      - name: Resolve commit SHA
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Remove exec_depend
        uses: autowarefoundation/autoware-github-actions/remove-exec-depend@v1

      - name: Get self packages
        id: self
        uses: autowarefoundation/autoware-github-actions/get-self-packages@v1

      - name: Build
        id: build
        if: ${{ steps.self.outputs.self-packages != '' }}
        uses: autowarefoundation/autoware-github-actions/colcon-build@v1
        with:
          rosdistro: ${{ inputs.ros_distro }}
          target-packages: ${{ inputs.package_name }}
          underlay-workspace: /opt/autoware

      - name: Test
        id: test
        if: ${{ steps.self.outputs.self-packages != '' }}
        uses: autowarefoundation/autoware-github-actions/colcon-test@v1
        with:
          rosdistro: ${{ inputs.ros_distro }}
          target-packages: ${{ inputs.package_name }}
          underlay-workspace: /opt/autoware

      - name: Compose result
        if: always()
        run: |
          cat > result.json <<EOF
          {
            "ros_distro": "${{ inputs.ros_distro }}",
            "autoware_version": "${{ needs.resolve.outputs.autoware_version }}",
            "package_name": "${{ inputs.package_name }}",
            "package_repository": "${{ inputs.package_repository }}",
            "package_ref": "${{ inputs.package_ref }}",
            "resolved_sha": "${{ steps.resolve.outputs.sha }}",
            "build_outcome": "${{ steps.build.outcome }}",
            "test_outcome": "${{ steps.test.outcome }}"
          }
          EOF

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validate-result-${{ inputs.ros_distro }}-${{ inputs.package_name }}-${{ needs.resolve.outputs.autoware_version }}
          path: result.json
          if-no-files-found: error
