name: validate-package

# Reusable workflow that builds, tests, and clang-tidies a ROS 2 package
# against a version-pinned Autoware Core container image, called from
# the package's own CI ("producer mode").
#
# The calling repository is checked out via actions/checkout. For the
# sweep-side counterpart that clones an external repo at a pinned ref,
# see sweep-package.yaml.
#
# Container pin:
#   ghcr.io/autowarefoundation/autoware:<base_image_stage>-<ros_distro>-<autoware_version>
#
# autoware_version is optional. When unset (the default), the `resolve`
# job picks the version at runtime so caller CIs do not have to bump on
# every Autoware release. See the autoware_version input docstring.
#
# Registered packages must not ship a build_depends.repos: the pinned
# image already contains the matching Autoware Core build, so this
# workflow intentionally does not expose a build_depends_repos input.
#
# If the resolved image tag does not exist on GHCR, the container pull
# fails with "manifest unknown" - that is the intended failure signal.

on:
  workflow_call:
    inputs:
      ros_distro:
        description: 'ROS 2 distribution (e.g. "jazzy").'
        required: true
        type: string
      autoware_version:
        description: |
          Autoware SemVer (e.g. "1.8.0"). Drives the container tag.
          When empty (the default), the workflow falls back to the
          latest-autoware-version composite action — the freshest
          autoware release whose container image is already on GHCR.
          See .github/actions/latest-autoware-version/action.yaml.
        required: false
        type: string
        default: ''
      package_name:
        description: 'ROS package name; passed to colcon --packages-up-to.'
        required: true
        type: string
      base_image_stage:
        description: 'Container image stage. Defaults to core-devel.'
        required: false
        type: string
        default: core-devel
      runs-on:
        description: |
          Runner label as a JSON-encoded array (workaround for the lack
          of array inputs in workflow_call). Default: '["ubuntu-24.04"]'.
        required: false
        type: string
        default: '["ubuntu-24.04"]'
      pull-ccache:
        description: 'Restore ccache from GHA cache before build.'
        required: false
        type: boolean
        default: true
      push-ccache:
        description: 'Save ccache to GHA cache after build.'
        required: false
        type: boolean
        default: false
      cache-key-element:
        description: 'Extra discriminator baked into the ccache key.'
        required: false
        type: string
        default: default
      concurrency-group:
        description: 'Concurrency group for this workflow_call invocation.'
        required: false
        type: string
        default: ${{ github.workflow }}-${{ github.ref }}-${{ github.run_id }}
      cancel-in-progress:
        description: 'Whether to cancel in-progress runs in the group.'
        required: false
        type: boolean
        default: false
      clang_tidy_config_url:
        description: 'URL of the .clang-tidy config used by the clang-tidy job.'
        required: false
        type: string
        default: https://raw.githubusercontent.com/autowarefoundation/autoware/main/.clang-tidy-ci

concurrency:
  group: ${{ inputs.concurrency-group }}
  cancel-in-progress: ${{ inputs.cancel-in-progress }}

env:
  CC: /usr/lib/ccache/gcc
  CXX: /usr/lib/ccache/g++
  CCACHE_DIR: /root/.ccache

jobs:
  resolve:
    name: resolve autoware_version
    runs-on: ubuntu-24.04
    outputs:
      autoware_version: ${{ inputs.autoware_version || steps.latest.outputs.autoware_version }}
    steps:
      - name: Resolve latest autoware_version
        id: latest
        if: inputs.autoware_version == ''
        uses: autowarefoundation/autoware-index-github-actions/.github/actions/latest-autoware-version@main
        with:
          ros_distro: ${{ inputs.ros_distro }}
          base_image_stage: ${{ inputs.base_image_stage }}

  build-and-test:
    needs: resolve
    name: build+test (${{ inputs.ros_distro }}, autoware ${{ needs.resolve.outputs.autoware_version }})
    runs-on: ${{ fromJson(inputs.runs-on) }}
    container:
      image: ghcr.io/autowarefoundation/autoware:${{ inputs.base_image_stage }}-${{ inputs.ros_distro }}-${{ needs.resolve.outputs.autoware_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show machine specs
        run: lscpu && free -h && df -h

      - name: Remove exec_depend
        uses: autowarefoundation/autoware-github-actions/remove-exec-depend@v1

      - name: Get self packages
        id: self
        uses: autowarefoundation/autoware-github-actions/get-self-packages@v1

      - name: Prepare ccache dir
        run: |
          if ! command -v ccache >/dev/null; then
            apt-get update
            apt-get install -y ccache
          fi
          mkdir -p "${CCACHE_DIR}"
          du -sh "${CCACHE_DIR}" && ccache -s
        shell: bash

      - name: Restore ccache
        if: ${{ inputs.pull-ccache == true }}
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-main-${{ runner.arch }}-${{ inputs.ros_distro }}-${{ needs.resolve.outputs.autoware_version }}-${{ github.sha }}
          restore-keys: |
            ccache-main-${{ runner.arch }}-${{ inputs.ros_distro }}-${{ needs.resolve.outputs.autoware_version }}-
            ccache-main-${{ runner.arch }}-${{ inputs.ros_distro }}-

      - name: Limit ccache size
        run: |
          rm -f "${CCACHE_DIR}/ccache.conf"
          printf '# Set maximum cache size\nmax_size = 900MB\n' >> "${CCACHE_DIR}/ccache.conf"
          ccache --zero-stats
        shell: bash

      - name: Build
        if: ${{ steps.self.outputs.self-packages != '' }}
        uses: autowarefoundation/autoware-github-actions/colcon-build@v1
        with:
          rosdistro: ${{ inputs.ros_distro }}
          target-packages: ${{ inputs.package_name }}
          cache-key-element: validate-package-${{ inputs.cache-key-element }}
          underlay-workspace: /opt/autoware

      - name: ccache stats after build
        if: ${{ always() }}
        run: du -sh "${CCACHE_DIR}" && ccache -s
        shell: bash

      - name: Save ccache
        if: ${{ inputs.push-ccache == true }}
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-main-${{ runner.arch }}-${{ inputs.ros_distro }}-${{ needs.resolve.outputs.autoware_version }}-${{ github.sha }}

      - name: Test
        if: ${{ steps.self.outputs.self-packages != '' }}
        uses: autowarefoundation/autoware-github-actions/colcon-test@v1
        with:
          rosdistro: ${{ inputs.ros_distro }}
          target-packages: ${{ inputs.package_name }}
          underlay-workspace: /opt/autoware

  clang-tidy:
    name: clang-tidy (${{ inputs.ros_distro }}, autoware ${{ needs.resolve.outputs.autoware_version }})
    needs: [resolve, build-and-test]
    runs-on: ${{ fromJson(inputs.runs-on) }}
    container:
      image: ghcr.io/autowarefoundation/autoware:${{ inputs.base_image_stage }}-${{ inputs.ros_distro }}-${{ needs.resolve.outputs.autoware_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Remove exec_depend
        uses: autowarefoundation/autoware-github-actions/remove-exec-depend@v1

      - name: Get self packages
        id: self
        uses: autowarefoundation/autoware-github-actions/get-self-packages@v1

      - name: Run clang-tidy
        if: ${{ steps.self.outputs.self-packages != '' }}
        uses: autowarefoundation/autoware-github-actions/clang-tidy@v1
        with:
          rosdistro: ${{ inputs.ros_distro }}
          target-packages: ${{ inputs.package_name }}
          clang-tidy-config-url: ${{ inputs.clang_tidy_config_url }}
          cache-key-element: validate-package-${{ inputs.cache-key-element }}
          artifact-name: clang-tidy-result-${{ inputs.ros_distro }}-${{ needs.resolve.outputs.autoware_version }}
          underlay-workspace: /opt/autoware
